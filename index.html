<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 礼物生成器</title>
    <link rel="stylesheet" href="./frontend/style.css">
</head>

<body>

    <div class="control-panel">
        <h3>🔧 数据控制台 (实时生效)</h3>

        <div class="form-group"
            style="flex-basis: 100%; flex-direction: row; align-items: flex-end; gap: 10px; border-bottom: 1px solid #3d4450; padding-bottom: 15px; margin-bottom: 5px;">
            <div style="flex: 1;">
                <label style="color: #66c0f4; font-weight: bold;">🚀 懒人模式：输入 Steam AppID 自动抓取游戏信息 (例如: 704850)</label>
                <input type="text" id="input-appid" placeholder="输入游戏商店链接里的数字 ID..." style="width: 100%;">
            </div>
            <button id="btn-fetch"
                style="background-color: #66c0f4; color: #12141a; font-weight: bold; padding: 9px 20px;">抓取数据</button>
            <button id="btn-download"
                style="background-color: #7c9c38; color: #fff; font-weight: bold; padding: 9px 20px;">📸 保存为图片</button>
        </div>

        <div class="form-group">
            <label>游戏封面图片 (URL)</label>
            <input type="text" id="input-game-img"
                value="https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/704850/header.jpg">
        </div>
        <div class="form-group">
            <label>游戏标题</label>
            <input type="text" id="input-game-title" value="Thief Simulator">
        </div>
        <div class="form-group" style="flex-basis: 100%;">
            <label>游戏描述</label>
            <textarea id="input-game-desc">成为最厉害的窃贼。收集情报，偷东西，再把东西卖了买高科技装备。做一切真的贼能做的事。</textarea>
        </div>
        <div class="form-group" style="flex-basis: 100%;">
            <label>留言内容</label>
            <textarea id="input-msg-text">可以肆意修改里面的内容哦~</textarea>
        </div>
        <div class="form-group">
            <label>发送者头像 (URL)</label>
            <input type="text" id="input-sender-avatar"
                value="https://avatars.cloudflare.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg">
        </div>
        <div class="form-group">
            <label>留言署名</label>
            <input type="text" id="input-msg-name" value="Hola!">
        </div>
        <div class="form-group">
            <label>真实发送者 (状态栏)</label>
            <input type="text" id="input-status-name" value="EaglePB2">
        </div>
        <div class="form-group">
            <label>日期</label>
            <input type="date" id="input-status-date" value="2021-01-15">
        </div>
    </div>

    <div class="steam-window">

        <div class="title-bar">
            <span class="window-title">您已收到一份礼物！</span>
            <div class="window-controls">
                <button class="min">—</button>
                <button class="close">✕</button>
            </div>
        </div>

        <div class="header">
            <h1>您已收到一份礼物！</h1>
        </div>

        <div class="gift-container">
            <div class="content-grid">
                <div class="game-card">
                    <img id="out-game-img"
                        src="https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/704850/header.jpg"
                        alt="Game Image">
                    <div class="game-info">
                        <h2 id="out-game-title">Thief Simulator</h2>
                        <hr>
                        <p id="out-game-desc">成为最厉害的窃贼。收集情报，偷东西，再把东西卖了买高科技装备。做一切真的贼能做的事。</p>
                    </div>
                </div>

                <div class="right-column">
                    <div class="message-box">
                        <div class="message-text" id="out-msg-text">可以肆意修改里面的内容哦~</div>
                        <div class="sender-info">
                            <img id="out-sender-avatar" class="status-ingame"
                                src="https://avatars.cloudflare.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg"
                                alt="Avatar">
                            <span id="out-msg-name">hola!</span>
                        </div>
                    </div>

                    <div class="action-box">
                        <div class="status-text">来自 <strong id="out-status-name">EaglePB2</strong>, 日期: <strong
                                id="out-status-date">1月 15日</strong></div>
                        <div class="status-text">状态: <strong>未签收</strong></div>
                        <div class="button-group">
                            <button class="btn-accept">接收礼物</button>
                            <button class="btn-decline">拒绝礼物</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="./frontend/index.js"> </script>
</body>

</html>
